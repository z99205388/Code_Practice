{% extends "learning_logs/base.html" %}

{% block content %}
<div class="container-fluid">
    <div class="row">
        <div class="col-md-12">
            <!-- 标题栏 -->
            <div class="row" style="margin-bottom: 20px;">
                <div class="col-md-8">
                    <h2 style="margin-top: 0;">
                        <span class="glyphicon glyphicon-film"></span> 
                        Apollo Record 2D 可视化播放器
                    </h2>
                    <p class="text-muted" style="margin: 5px 0;">
                        文件: {{ file_name }} | 总帧数: {{ frame_count }}
                    </p>
                </div>
                <div class="col-md-4 text-right">
                    <a href="{% url 'data_visualization:record_player_index' %}" 
                       class="btn btn-default">
                        <span class="glyphicon glyphicon-arrow-left"></span> 返回
                    </a>
                </div>
            </div>
            
            <!-- 可视化画布 -->
            <div class="row">
                <div class="col-md-12">
                    <div id="visualization-container" 
                         style="background-color: #1a1a2e; border-radius: 8px; padding: 10px; position: relative;">
                        <img id="frame-image" 
                             src="" 
                             alt="Waiting for frame..." 
                             style="width: 100%; border-radius: 4px; display: none;">
                        
                        <!-- 加载指示器 -->
                        <div id="loading-indicator" 
                             style="position: absolute; top: 50%; left: 50%; 
                                    transform: translate(-50%, -50%); 
                                    color: white; font-size: 18px; display: none;">
                            <span class="glyphicon glyphicon-refresh glyphicon-refresh-animate"></span>
                            加载中...
                        </div>
                        
                        <!-- 初始提示 -->
                        <div id="initial-message" 
                             style="position: absolute; top: 50%; left: 50%; 
                                    transform: translate(-50%, -50%); 
                                    color: #87CEEB; font-size: 16px; text-align: center;">
                            <span class="glyphicon glyphicon-hand-left"></span><br>
                            拖动进度条或点击播放开始<br>
                            <small class="text-muted">Loading first frame...</small>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- 播放控制面板 -->
            <div class="row" style="margin-top: 20px;">
                <div class="col-md-12">
                    <div class="panel panel-default">
                        <div class="panel-body">
                            <!-- 播放控制按钮 -->
                            <div class="row" style="margin-bottom: 15px;">
                                <div class="col-md-12 text-center">
                                    <button id="btn-first" class="btn btn-default btn-lg" title="第一帧">
                                        <span class="glyphicon glyphicon-fast-backward"></span>
                                    </button>
                                    <button id="btn-prev" class="btn btn-default btn-lg" title="上一帧">
                                        <span class="glyphicon glyphicon-step-backward"></span>
                                    </button>
                                    <button id="btn-play" class="btn btn-primary btn-lg" title="播放/暂停">
                                        <span class="glyphicon glyphicon-play"></span>
                                    </button>
                                    <button id="btn-next" class="btn btn-default btn-lg" title="下一帧">
                                        <span class="glyphicon glyphicon-step-forward"></span>
                                    </button>
                                    <button id="btn-last" class="btn btn-default btn-lg" title="最后一帧">
                                        <span class="glyphicon glyphicon-fast-forward"></span>
                                    </button>
                                    
                                    <!-- 速度控制 -->
                                    <div class="btn-group" style="margin-left: 20px;">
                                        <button class="btn btn-default speed-btn" data-speed="0.5">0.5x</button>
                                        <button class="btn btn-primary speed-btn active" data-speed="1">1x</button>
                                        <button class="btn btn-default speed-btn" data-speed="2">2x</button>
                                        <button class="btn btn-default speed-btn" data-speed="4">4x</button>
                                    </div>
                                </div>
                            </div>
                            
                            <!-- 进度条 -->
                            <div class="row">
                                <div class="col-md-12">
                                    <div class="form-group">
                                        <label>
                                            帧: <span id="current-frame">0</span> / {{ frame_count }}
                                            | 时间: <span id="current-time">0.00</span>s
                                        </label>
                                        <input type="range" 
                                               class="form-control" 
                                               id="progress-slider" 
                                               min="0" 
                                               max="{{ frame_count }}" 
                                               value="0"
                                               step="1">
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- 统计信息 -->
            <div class="row">
                <div class="col-md-12">
                    <div class="panel panel-info">
                        <div class="panel-heading">
                            <h3 class="panel-title"><span class="glyphicon glyphicon-info-sign"></span> 统计信息</h3>
                        </div>
                        <div class="panel-body">
                            <div class="row">
                                <div class="col-md-3">
                                    <strong>总消息数:</strong> <span id="stat-total">-</span>
                                </div>
                                <div class="col-md-3">
                                    <strong>定位数据:</strong> <span id="stat-poses">-</span>
                                </div>
                                <div class="col-md-3">
                                    <strong>车辆数据:</strong> <span id="stat-vehicles">-</span>
                                </div>
                                <div class="col-md-3">
                                    <strong>车道线:</strong> <span id="stat-lanes">-</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// 播放器状态
const state = {
    currentFrame: 0,
    totalFrames: {{ frame_count }},
    isPlaying: false,
    playSpeed: 1,
    playInterval: null,
    // 将纳秒时间戳转换为秒
    timestamps: {{ timestamps|safe }}.map(t => t / 1e9),
    fileName: '{{ file_name }}',
};

// DOM 元素
const elements = {
    frameImage: document.getElementById('frame-image'),
    loadingIndicator: document.getElementById('loading-indicator'),
    initialMessage: document.getElementById('initial-message'),
    progressSlider: document.getElementById('progress-slider'),
    currentFrame: document.getElementById('current-frame'),
    currentTime: document.getElementById('current-time'),
    btnPlay: document.getElementById('btn-play'),
    btnFirst: document.getElementById('btn-first'),
    btnLast: document.getElementById('btn-last'),
    btnPrev: document.getElementById('btn-prev'),
    btnNext: document.getElementById('btn-next'),
    speedBtns: document.querySelectorAll('.speed-btn'),
    statTotal: document.getElementById('stat-total'),
    statPoses: document.getElementById('stat-poses'),
    statVehicles: document.getElementById('stat-vehicles'),
    statLanes: document.getElementById('stat-lanes'),
};

// 初始化统计信息
const stats = {{ stats|safe }};
elements.statTotal.textContent = stats.total_messages;
elements.statPoses.textContent = stats.ego_poses;
elements.statVehicles.textContent = stats.vehicles;
elements.statLanes.textContent = stats.lanes;

// 加载帧
async function loadFrame(frameIndex) {
    if (frameIndex < 0 || frameIndex >= state.totalFrames) return;
    
    state.currentFrame = frameIndex;
    
    // 显示加载指示器
    elements.loadingIndicator.style.display = 'block';
    elements.initialMessage.style.display = 'none';
    
    // 更新进度条
    elements.progressSlider.value = frameIndex;
    elements.currentFrame.textContent = frameIndex;
    elements.currentTime.textContent = state.timestamps[frameIndex]?.toFixed(2) || '0.00';
    
    try {
        const response = await fetch(`/data_visualization/record-player/${state.fileName}/frame/${frameIndex}/`);
        const data = await response.json();
        
        if (data.success) {
            // 更新图片
            elements.frameImage.src = data.image_url;
            elements.frameImage.style.display = 'block';
            elements.loadingIndicator.style.display = 'none';
        } else {
            console.error('Failed to load frame:', data.error);
        }
    } catch (error) {
        console.error('Error loading frame:', error);
        elements.loadingIndicator.style.display = 'none';
    }
}

// 播放
function startPlaying() {
    if (state.isPlaying) return;
    
    state.isPlaying = true;
    elements.btnPlay.innerHTML = '<span class="glyphicon glyphicon-pause"></span>';
    
    // 根据速度计算间隔（基础 100ms）
    const interval = 100 / state.playSpeed;
    
    state.playInterval = setInterval(() => {
        if (state.currentFrame < state.totalFrames - 1) {
            loadFrame(state.currentFrame + 1);
        } else {
            stopPlaying();
        }
    }, interval);
}

// 暂停
function stopPlaying() {
    state.isPlaying = false;
    elements.btnPlay.innerHTML = '<span class="glyphicon glyphicon-play"></span>';
    
    if (state.playInterval) {
        clearInterval(state.playInterval);
        state.playInterval = null;
    }
}

// 切换播放/暂停
function togglePlay() {
    if (state.isPlaying) {
        stopPlaying();
    } else {
        startPlaying();
    }
}

// 设置播放速度
function setPlaySpeed(speed) {
    state.playSpeed = speed;
    
    // 更新按钮状态
    elements.speedBtns.forEach(btn => {
        btn.classList.remove('btn-primary');
        btn.classList.add('btn-default');
        if (parseFloat(btn.dataset.speed) === speed) {
            btn.classList.remove('btn-default');
            btn.classList.add('btn-primary');
        }
    });
    
    // 如果正在播放，重启定时器
    if (state.isPlaying) {
        stopPlaying();
        startPlaying();
    }
}

// 事件监听
elements.btnPlay.addEventListener('click', togglePlay);
elements.btnFirst.addEventListener('click', () => {
    stopPlaying();
    loadFrame(0);
});
elements.btnLast.addEventListener('click', () => {
    stopPlaying();
    loadFrame(state.totalFrames - 1);
});
elements.btnPrev.addEventListener('click', () => {
    if (state.currentFrame > 0) {
        loadFrame(state.currentFrame - 1);
    }
});
elements.btnNext.addEventListener('click', () => {
    if (state.currentFrame < state.totalFrames - 1) {
        loadFrame(state.currentFrame + 1);
    }
});

// 进度条拖动
elements.progressSlider.addEventListener('input', (e) => {
    stopPlaying();
    loadFrame(parseInt(e.target.value));
});

// 速度按钮
elements.speedBtns.forEach(btn => {
    btn.addEventListener('click', () => {
        setPlaySpeed(parseFloat(btn.dataset.speed));
    });
});

// 键盘快捷键
document.addEventListener('keydown', (e) => {
    if (e.code === 'Space') {
        e.preventDefault();
        togglePlay();
    } else if (e.code === 'ArrowLeft') {
        e.preventDefault();
        if (state.currentFrame > 0) {
            loadFrame(state.currentFrame - 1);
        }
    } else if (e.code === 'ArrowRight') {
        e.preventDefault();
        if (state.currentFrame < state.totalFrames - 1) {
            loadFrame(state.currentFrame + 1);
        }
    }
});

// 初始加载第一帧
loadFrame(0);
</script>

<style>
/* 加载指示器动画 */
.glyphicon-refresh-animate {
    animation: spin 1s infinite linear;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

/* 进度条样式 */
#progress-slider {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 8px;
    border-radius: 4px;
    background: #2a2a3e;
    outline: none;
    cursor: pointer;
}

#progress-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: #FF6B35;
    cursor: pointer;
}

#progress-slider::-moz-range-thumb {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: #FF6B35;
    cursor: pointer;
    border: none;
}

/* 速度按钮 */
.speed-btn {
    min-width: 60px;
}
</style>
{% endblock content %}
